<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gpt-image-2 gallery</title>
    <link rel="stylesheet" href="src/css.css">
    <style>
        body { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        h1 { text-align: center; margin: 30px 0 10px; font-size: 22px; font-weight: normal; }
        .back-link { text-align: center; margin: 20px 0; }
        .back-link a { color: #0066cc; text-decoration: none; font-size: 14px; }
        .back-link a:hover { text-decoration: underline; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            padding: 20px 0 40px;
        }
        .gallery .item { display: flex; flex-direction: column; }
        .gallery a {
            display: block;
            overflow: hidden;
            border-radius: 4px;
            background: #f5f5f5;
            aspect-ratio: 1 / 1;
        }
        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s ease;
        }
        .gallery a:hover img { transform: scale(1.04); }
        .gallery .note {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
            line-height: 1.3;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="index.html">← Back to main page</a>
    </div>

    <h1>Images generated by gpt-image-2 in April / May 2026</h1>

    <div class="gallery" id="gallery"></div>

    <div class="lightbox" id="lightbox">
        <span class="close" id="lbClose">×</span>
        <img id="lbImg" alt="">
    </div>

    <script>
        // id => influence note (file ids stay stable; some originals were removed)
        const notes = {
            1:  "Influence: Escher",
            2:  "Influence: Francis Bacon",
            3:  "Influence: Escher, Magritte",
            6:  "Influence: Escher",
            9:  "Influence: Saul Leiter",
            13: "Influence: The Beatles",
            15: "Influence: Magritte",
            17: "Influence: Escher",
            18: "Influence: Escher",
            21: "Influence: Escher",
            23: "Influence: Escher",
        };
        // Ordered colorful → monochrome, grouped by influence/vibe
        const ids = [8, 9, 15, 2, 19, 1, 13, 3, 23, 21, 18, 6, 17];
        const gallery = document.getElementById('gallery');
        ids.forEach((i, idx) => {
            const id = String(i).padStart(2, '0');
            const item = document.createElement('div');
            item.className = 'item';
            const a = document.createElement('a');
            a.href = `gptimage/img${id}.png`;
            a.dataset.full = `gptimage/img${id}.png`;
            const img = document.createElement('img');
            img.src = `gptimage/thumbs/img${id}.png`;
            img.loading = 'lazy';
            img.alt = `gpt-image-2 generation ${idx + 1}`;
            a.appendChild(img);
            item.appendChild(a);
            if (notes[i]) {
                const note = document.createElement('div');
                note.className = 'note';
                note.textContent = notes[i];
                item.appendChild(note);
            }
            gallery.appendChild(item);
        });

        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lbImg');
        const lbClose = document.getElementById('lbClose');

        gallery.addEventListener('click', (e) => {
            const a = e.target.closest('a');
            if (!a) return;
            e.preventDefault();
            lbImg.src = a.dataset.full;
            lb.classList.add('open');
        });
        function closeLB() { lb.classList.remove('open'); lbImg.src = ''; }
        lb.addEventListener('click', closeLB);
        lbClose.addEventListener('click', closeLB);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLB(); });
    </script>
</body>
</html>
